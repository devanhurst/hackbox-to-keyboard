name: Release

# Build macOS + Windows installers when a version tag is pushed (e.g. v0.1.0),
# and attach them to a GitHub release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel universal binary
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both arch targets; harmless on Windows.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing is OFF by default (builds are unsigned). Do NOT define
          # the APPLE_CERTIFICATE env var unless you actually have the secret:
          # tauri-action runs `security import` whenever the var is *defined* —
          # even as an empty string when the secret is unset — and importing an
          # empty cert fails the whole build ("security import ... parameters not
          # valid").
          #
          # To enable free self-signed signing (a stable signature so the macOS
          # Accessibility key-injection grant persists), add the repo secrets
          # described in the README, then UNCOMMENT the four lines below. (This
          # does NOT remove the Gatekeeper download warning — only Apple
          # notarization does: add APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID with an
          # Apple Developer cert for that.)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Hackbox → Keyboard ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
