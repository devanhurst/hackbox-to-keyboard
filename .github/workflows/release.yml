name: Release

# Every merge to `main` cuts a release. This single workflow run:
#   1. derives the semver bump from the conventional commits since the last tag,
#   2. writes the new version to the four lockstep sites + commits & tags it,
#   3. pushes the bump commit and tag back to `main`, then
#   4. builds, signs/notarizes, and publishes the macOS universal + Windows
#      installers as a GitHub release.
#
# No human runs a command or creates a tag by hand.
#
# Loop guard (the critical correctness property): the bump commit is authored
# `chore: release vX.Y.Z [skip ci]`. `[skip ci]` makes GitHub skip the workflow
# run that the push-back to `main` would otherwise trigger, so the release does
# not loop. The job-level `if:` below is a belt-and-suspenders second layer: it
# also refuses to run on any commit whose message starts with `chore: release v`
# (e.g. a `[skip ci]` that an org setting failed to honor, or a manual bump).
#
# Why one workflow instead of a tag trigger: a tag pushed with the default
# GITHUB_TOKEN does NOT start a separate `on: push: tags` workflow, so a
# tag-triggered build would be silently skipped. We therefore consolidate the
# bump, tag, build, and publish into this one push-to-main run.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize releases so two quick merges can't race on the version bump / push.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    # Skip our own release bump commits (loop guard fallback). Always run on a
    # manual dispatch, where there is no head_commit context.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (!contains(github.event.head_commit.message, '[skip ci]') &&
           !startsWith(github.event.head_commit.message, 'chore: release v')) }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Full history + tags so the bump can be derived from the commits
          # since the last release tag.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust
        # Lets release.mjs keep Cargo.lock valid via `cargo update --precise`.
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, update four sites, commit & tag
        id: bump
        run: node scripts/release.mjs auto --ci

      - name: Push commit and tag
        # The bump commit carries `[skip ci]`, so this push does not re-trigger
        # the workflow. The tag does not match the `branches: [main]` trigger.
        # `HEAD:main` works whether checkout left us on a branch or detached;
        # `--follow-tags` also pushes the annotated vX.Y.Z tag.
        run: git push --follow-tags origin HEAD:main

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel universal binary
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Build exactly the tagged bump commit the release attaches to.
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both arch targets; harmless on Windows.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. With these set, tauri-action signs the update
          # artifacts and generates + uploads `latest.json` (the manifest the
          # app polls). Generate the keypair once with
          # `npm run tauri signer generate -- -w ~/.tauri/hackbox.key`, then add
          # the secrets (see README). Without them the build still succeeds but
          # no updater manifest is produced, so in-app updates won't work.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing + notarization. tauri-action imports the
          # cert from APPLE_CERTIFICATE and signs with APPLE_SIGNING_IDENTITY;
          # when APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID are also present it
          # notarizes and staples, which removes the Gatekeeper "unidentified
          # developer" warning and gives a stable signature so the macOS
          # Accessibility key-injection grant survives updates.
          #
          # All of these must be set as repo secrets BEFORE the first release: once
          # APPLE_CERTIFICATE is defined, tauri-action runs `security import` on
          # the macOS runner, and an empty/unset value fails the whole build
          # ("security import ... parameters not valid"). See the README for how
          # to create the cert and an app-specific password.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Hackbox → Keyboard ${{ needs.prepare.outputs.tag }}"
          releaseBody: "See the assets below to download and install."
          # Publish automatically (no manual draft step) — every merge ships.
          releaseDraft: false
          prerelease: false
