[package]
name = "hackbox-to-keyboard"
version = "3.1.0"
description = "Hackbox host client that casts player button presses to OS-level keypresses"
edition = "2021"

[lib]
name = "hackbox_to_keyboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
enigo = "0.2"
