<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackbox → Keyboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <header class="topbar">
        <h1>Hackbox&nbsp;→&nbsp;Keyboard</h1>
        <div class="status">
          <span id="status-dot" class="dot offline"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </header>

      <section class="config">
        <div class="room">
          <span class="room-label">Room code</span>
          <div class="room-code-group">
            <span id="room-code" class="room-code">————</span>
            <button
              id="new-room-btn"
              class="icon-btn"
              title="Generate a new room code"
              aria-label="Generate a new room code"
            >
              ↻
            </button>
          </div>
        </div>
      </section>

      <section class="players">
        <h2>Players</h2>
        <ul id="player-list"></ul>
        <p id="empty-hint" class="hint">No players yet. Share the room code to let people join.</p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
